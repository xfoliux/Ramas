<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Comandos Git</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Diccionario Git Interactiva</h1>
        <p>Aprendiendo a trabajar con ramas</p>
    </header>
    <main id="contenedor">
        <section class="comando">
            <h2>git init</h2>
            <p>Inicializa un nuevo repositorio local en la carpeta actual.</p>
        </section>
        <section class="comando">
            <h2>git clone</h2>
            <p>Descarga una copia exacta de un repositorio remoto.</p>
        </section>
        <section class="comando">
            <h2>git add</h2>
            <p>Prepara los cambios (staging) para ser incluidos en el próximo commit.</p>
        </section>
        <!-- Aquí los estudiantes agregarán más comandos luego -->
    </main>
</body>
</html>
